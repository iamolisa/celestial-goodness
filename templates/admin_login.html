{% extends "base.html" %}
{% block title %}Admin Login — Celestial Goodness Astrology & Tarot{% endblock %}
{% block nav %}{% endblock %}
{% block footer %}{% endblock %}

{% block body %}
<div class="flex min-h-screen items-center justify-center p-4 bg-gradient-hero star-field">
  <div class="card w-full max-w-sm p-8 animate-scale-in">
    <div class="mb-6 text-center">
      <div class="text-3xl mb-3 animate-pulse-glow">✦</div>
      <h1 class="font-display text-2xl font-bold" style="color:var(--fg)">Admin Portal</h1>
      <p class="mt-1 font-body text-sm" style="color:var(--muted)">Secure access to dashboard</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="mb-1.5 block font-body text-sm font-medium" style="color:var(--fg)">Email</label>
        <input type="email" name="email" required placeholder="admin@celestialgoodnessastrology.com" class="input-base" />
      </div>
      <div>
        <label class="mb-1.5 block font-body text-sm font-medium" style="color:var(--fg)">Password</label>
        <input type="password" name="password" required placeholder="••••••••" class="input-base" />
      </div>
      <button type="submit" id="loginBtn" class="btn-gold w-full py-3.5">🔒 Sign In</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    const { ok, data } = await api.post('/api/admin/login', Object.fromEntries(new FormData(e.target)));
    if (ok) {
      window.location.href = '/admin/dashboard';
    } else {
      showToast(data.error || 'Invalid credentials', 'error');
      btn.disabled = false; btn.innerHTML = '🔒 Sign In';
    }
  });
</script>
{% endblock %}
